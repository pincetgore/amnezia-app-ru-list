name: Update IP List and Create Release

on:
  schedule:
    - cron: '0 4 * * 1' # Запуск каждый понедельник в 04:00 UTC
  workflow_dispatch:    # Позволяет запускать процесс вручную через интерфейс GitHub

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Дает права на создание/обновление релиза и тега

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pyyaml

      - name: Run tests
        run: |
          pytest

      - name: Get current date and trigger type
        id: date
        run: |
          echo "CURRENT_DATE=$(date +'%d.%m.%Y')" >> $GITHUB_ENV
          echo "CURRENT_DATETIME=$(date +'%Y-%m-%d_%H-%M')" >> $GITHUB_ENV
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "RELEASE_LABEL=manual" >> $GITHUB_ENV
          else
            echo "RELEASE_LABEL=auto" >> $GITHUB_ENV
          fi

      - name: Generate artifacts
        run: |
          python main.py -o ip-list-${{ env.CURRENT_DATETIME }}.json -f amnezia
          python main.py -o cidrs-${{ env.CURRENT_DATETIME }}.txt -f plain

      - name: Delete old release and tag
        run: |
          gh release delete latest -y || echo "No 'latest' release to delete"
          git push origin --delete latest || echo "No 'latest' tag to delete"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release and Upload Artifacts
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ip-list-*.json
            cidrs-*.txt
          tag_name: latest
          name: "Актуальный список IP-адресов (${{ env.CURRENT_DATE }}) [${{ env.RELEASE_LABEL }}]"
          body: |
            Автоматически сгенерированный список IP-адресов и доменов российских сервисов.
            
            📅 **Дата генерации:** ${{ env.CURRENT_DATETIME }}
            🏷 **Тип запуска:** ${{ env.RELEASE_LABEL }}

            - `ip-list-${{ env.CURRENT_DATETIME }}.json` — для импорта в AmneziaVPN.
            - `cidrs-${{ env.CURRENT_DATETIME }}.txt` — простой список CIDR-диапазонов.