name: Update IP List and Create Release

on:
  schedule:
    - cron: '0 4 * * 1' # Запуск каждый понедельник в 04:00 UTC
  workflow_dispatch:    # Позволяет запускать процесс вручную через интерфейс GitHub

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Дает права на создание/обновление релиза и тега

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pyyaml

      - name: Run tests
        run: |
          pytest tests/

      - name: Generate artifacts
        run: |
          python main.py -o ip-list.json -f amnezia
          python main.py -o cidrs.txt -f plain

      - name: Delete old release and tag
        run: |
          gh release delete latest -y || echo "No 'latest' release to delete"
          git push origin --delete latest || echo "No 'latest' tag to delete"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release and Upload Artifacts
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ip-list.json
            cidrs.txt
          tag_name: latest
          name: "Актуальный список IP-адресов"
          body: |
            Автоматически сгенерированный список IP-адресов и доменов российских сервисов.
            - `ip-list.json` — для импорта в AmneziaVPN.
            - `cidrs.txt` — простой список CIDR-диапазонов.